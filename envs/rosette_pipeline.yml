name: rosette_pipeline
channels:
  - conda-forge
  - bioconda
dependencies:
  - r-data.table
  - r-optparse
  - r-jsonlite
  - r-stringr
  - r-dplyr
  - r-tidyr
  - r-readr
  - r-ggplot2
